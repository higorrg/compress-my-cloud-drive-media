name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install ffmpeg and ghostscript
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ghostscript
      - name: Set version from tag
        run: mvn -B versions:set -DnewVersion=${GITHUB_REF_NAME#v} -DgenerateBackupPoms=false --file pom.xml
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-runner.jar
          generate_release_notes: true
